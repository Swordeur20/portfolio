<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notre Promotion Web - Bootcamp Seconde</title>
  <!-- Importation des polices Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Feuille de style principale -->
  <link rel="stylesheet" href="Alexis.html">
</head>
<body>

  <header>
    <!-- Bouton pour changer de thème (sombre/clair) -->
    <div class="theme-toggle-container">
      <button id="theme-toggle" class="theme-btn">☀️ Mode Clair</button>
    </div>
    <div class="entete">
    <h1>🚀 Notre Promotion Web</h1>
    <p>Stage de Seconde - Création de Portfolios</p>
    </div>
  </header>

  <main>
    <!-- Section d'accueil -->
    <section class="welcome-section">
      <h2 class="welcome-title">Bienvenue sur notre espace collectif !</h2>
    </section>

    <!-- Grille contenant les cartes de chaque élève -->
    <section class="grid-portfolios">
      
      <!-- Élève Exemple (Modèle) -->
     <div class="un">
      <!-- Emplacement Élève 1 -->
      <article class="student-card1">
        <div class="student-avatar">💻</div>
        <h3 class="student-name">Alexis</h3>
        <!-- Remplacer "prenom.html" par le nom de fichier réel -->
        <p class="Alexis.html">Visiter le site</p>
      </article>

      <!-- Emplacement Élève 2 -->
      <article class="student-card2">
        <div class="student-avatar">🎨</div>
        <h3 class="student-name">Nolhan</h3>
        
        <a href="nolhan.html" class="btn btn-secondary">Visiter le site</a>
      </article>

      <!-- Emplacement Élève 3 -->
      <article class="student-card3">
        <div class="student-avatar">🎮</div>
        <h3 class="student-name">Gabin</h3>

        <a href="gabin.html" class="btn btn-secondary">Visiter le site</a>
      </article>
     </div>
     <div class="deux">
      <!-- Emplacement Élève 4 -->
      <article class="student-card4">
        <div class="student-avatar">✍️</div>
        <h3 class="student-name">Anneseeslie</h3>
  
        <a href="anneeslie.html" class="btn btn-secondary">Visiter le site</a>
      </article>

      <!-- Emplacement Élève 5 -->
      <article class="student-card5">
        <div class="student-avatar">🚀</div>
        <h3 class="student-name">maxence</h3>

        <a href="maxence.html" class="btn btn-secondary">Visiter le site</a>
      </article>
     </div>
    </section>
  </main>

  <footer>
    <p>© 2026 - Conçu avec ❤️ lors du stage de Seconde</p>
  </footer>

  <!-- Script d'interactivité -->
  <script src="script.js"></script>
</body>
</html>
